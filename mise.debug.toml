[env]
#FONT_RASTERIZER_DEBUG = "true"
FONT_RASTERIZER_DEBUG_SHADER = "true"

[tasks.build-aatest]
description = "Run the aatest"
run = "cargo build --example aa_test"

[tasks.run-aatest]
description = "Run the aatest"
run = "./target/debug/examples/aa_test"
run_windows = ".\\target\\debug\\examples\\aa_test.exe"
depends = "build-aatest"

[tasks.build-aasvgtest]
description = "Run the aasvgtest"
run = "cargo build --example aa_svg_test"

[tasks.run-aasvgtest]
description = "Run the aasvgtest"
run = "./target/debug/examples/aa_svg_test"
run_windows = ".\\target\\debug\\examples\\aa_svg_test.exe"
depends = "build-aasvgtest"

[tasks.build-vector-vertex-to-png]
description = "Build vector_vertex_to_png example"
run = "cargo build -p font_rasterizer --example vector_vertex_to_png"
sources = [
    "Cargo.toml",
    "font_rasterizer/Cargo.toml",
    "font_rasterizer/src/**",
    "font_rasterizer/examples/*.rs",
    "font_rasterizer/examples/cases/*.toml",
]
outputs = [
    "target/debug/examples/vector_vertex_to_png",
    "target/debug/examples/vector_vertex_to_png.exe",
]

[tasks.run-vector-vertex-to-png]
description = "Run vector_vertex_to_png example"
run = "./target/debug/examples/vector_vertex_to_png"
run_windows = ".\\target\\debug\\examples\\vector_vertex_to_png.exe"
depends = "build-vector-vertex-to-png"
